<!DOCTYPE html>
<html>
<head>
<title>AR.js A-Frame Location-based EJEMPLO</title>
<!-- scripts para utilizar aframe - threejs -->
<!-- CAMBIAR POR LA VERSIÓN DESEADA O MÁS RECIENTE DE AFRAME -->
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<!-- CAMBIAR POR LA VERSIÓN DESEADA O MÁS RECIENTE DE THREEJS Y AFRAME-AR -->
<script 
    type='text/javascript' 
    src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'>
</script>
<script 
    type='text/javascript' 
    src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'>
</script>
</head>
<body>
<a-scene 
    vr-mode-ui="enabled: false" 
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" 
    renderer="antialias: true; alpha: true">
    <!-- crear "cámara" ligada al móvil/gps -->
    <a-camera gps-new-camera='gpsMinDistance: 5'></a-camera>
    <!-- crear objetos -->
    <!-- Posición seleccionada: UNLA - EDIF D : UN CUBO APARECE EN LA POSICIÓN INDICADA -->
    <a-entity 
        material='color: red' 
        geometry='primitive: box' 
        gps-new-entity-place="latitude: 19.696642; longitude: -101.235041" 
        scale="10 10 10">
    </a-entity>
</a-scene>
</body>
</html>
